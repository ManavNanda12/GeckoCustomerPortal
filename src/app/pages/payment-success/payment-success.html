<div class="payment-screen success">
  <div class="floating-orb orb-1"></div>
  <div class="floating-orb orb-2"></div>

  <div class="payment-card">
    <div class="icon-circle success-circle">
      <i class="fa-solid fa-check"></i>
    </div>

    <h1 class="payment-title">Payment Successful</h1>
    <p class="payment-subtitle">
      Your subscription has been activated. Redirecting you to plans...
    </p>

    <div class="payment-details">
      <div class="detail-line">
        <span class="label">Status</span>
        <span class="value success-text">Succeeded</span>
      </div>
      <div class="detail-line">
        <span class="label">Next</span>
        <span class="value">Going back to Subscriptions in a moment</span>
      </div>
    </div>

    <button class="primary-btn" routerLink="/subscriptions">
      Go to Subscriptions Now
    </button>
  </div>
</div>
