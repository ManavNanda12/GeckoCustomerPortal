<div class="payment-screen error">
  <div class="floating-orb orb-1"></div>
  <div class="floating-orb orb-2"></div>

  <div class="payment-card">
    <div class="icon-circle error-circle">
      <i class="fa-solid fa-circle-xmark"></i>
    </div>

    <h1 class="payment-title">Payment Failed</h1>
    <p class="payment-subtitle">
      Something went wrong while processing your payment. You were not charged.
      Redirecting you back to subscriptions...
    </p>

    <div class="payment-details">
      <div class="detail-line">
        <span class="label">Status</span>
        <span class="value error-text">Failed</span>
      </div>
      <div class="detail-line">
        <span class="label">Next</span>
        <span class="value">Review your plan or try another payment method</span>
      </div>
    </div>

    <button class="primary-btn" routerLink="/subscriptions">
      Back to Subscriptions
    </button>
  </div>
</div>
